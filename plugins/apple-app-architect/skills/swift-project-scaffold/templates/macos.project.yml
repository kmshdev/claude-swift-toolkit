name: __APP_NAME__
options:
  bundleIdPrefix: __BUNDLE_PREFIX__
  deploymentTarget:
    macOS: "__MACOS_TARGET__"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "__MACOS_TARGET__"
    ENABLE_DEBUG_DYLIB: YES
targets:
  __APP_NAME__:
    type: application
    platform: macOS
    sources:
      - path: Sources/__APP_NAME__
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__
        PRODUCT_NAME: __APP_NAME__
        CODE_SIGN_IDENTITY: "-"
    info:
      path: Sources/__APP_NAME__/Info.plist
      properties:
        CFBundleDisplayName: __APP_NAME__
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
  __APP_NAME__Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/__APP_NAME__Tests
    dependencies:
      - target: __APP_NAME__
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/__APP_NAME__.app/Contents/MacOS/__APP_NAME__"
        BUNDLE_LOADER: "$(TEST_HOST)"
